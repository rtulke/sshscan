# SSH Algorithm Security Scanner — Configuration File
# Format: standard INI / Linux config (parsed by Python configparser)
#
# Auto-discovery locations (first found wins):
#   ./sshscan.conf               local directory (highest priority)
#   ~/.conf/sshscan.conf         user config
#   /etc/sshscan/sshscan.conf   system-wide

# ====================================================================
# SCANNER CONFIGURATION
# ====================================================================
[scanner]

# Number of concurrent scanning threads (1-500)
# Recommended: 20-50 for most networks
threads = 30

# Connection timeout in seconds (1-120)
# Recommended: 10s for reliable networks, 20-30s for slow networks
timeout = 15

# Number of retry attempts for failed connections (1-10)
# A short delay is applied between retries
retry_attempts = 3

# DNS cache TTL in seconds (60-3600)
# Recommended: 300s (5 min) for most cases, 600s+ for large batch scans
dns_cache_ttl = 600

# Banner grab timeout in seconds (1-30)
# Default: min(timeout, 5) — override here or via --timeout-banner
# banner_timeout = 3

# Maximum new SSH connections per second (0.1-1000)
# Throttles every SSH connection (banner + algorithm probes) — useful for
# rate-limited or fragile targets
# Default: unlimited — enable here or via --rate-limit
# rate_limit = 10.0

# SSH StrictHostKeyChecking: yes / no / accept-new
# accept-new: auto-accept unknown hosts, reject changed keys (default)
# no:         accept everything silently
# yes:        only connect to hosts already in known_hosts (not useful for scanning)
# strict_host_key_checking = accept-new

# Global SSH jump / bastion host (overridable per-host in host files via "via:" field)
# Format: [user@]host[:port]   — OpenSSH -J syntax
# jump_host = admin@bastion.corp:22

# Global SSH ProxyCommand (overridable per-host in host files)
# Use for SOCKS5 / HTTP CONNECT proxies.  %h and %p are expanded by OpenSSH.
# proxy_command = nc -X 5 -x socks5proxy.corp:1080 %h %p

# Scan mode: read the server's KEXINIT in a single connection (yes, the default)
# instead of probing each algorithm separately via the local ssh client (no).
# The KEXINIT read is client-independent and auto-falls back to probing behind a
# proxy/jump-host. Override per run with --probe (= fast off) or --fast.
# fast = yes

# ====================================================================
# COMPLIANCE CONFIGURATION
# ====================================================================
[compliance]

# Compliance framework to check against
# Available: NIST, FIPS_140_2, BSI_TR_02102, ANSSI, PRIVACY_FOCUSED
framework = NIST

# ====================================================================
# EXAMPLE CONFIGURATIONS
# ====================================================================

# High-security privacy-focused configuration:
# [scanner]
# threads = 50
# timeout = 12
# retry_attempts = 3
# dns_cache_ttl = 600
# [compliance]
# framework = PRIVACY_FOCUSED

# Fast scanning for large networks:
# [scanner]
# threads = 100
# timeout = 5
# retry_attempts = 2
# dns_cache_ttl = 1200
# [compliance]
# framework = NIST

# Conservative configuration for unreliable networks:
# [scanner]
# threads = 10
# timeout = 30
# retry_attempts = 5
# dns_cache_ttl = 300
# [compliance]
# framework = FIPS_140_2
