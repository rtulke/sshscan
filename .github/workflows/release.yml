name: Release binaries

# Tag push -> build + attach to the GitHub release.
# Manual run  -> build only (artifacts land under the workflow run, no release touched).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  # The oldest glibc we link against. Everything at or above this runs the binary.
  # 2.28 = RHEL/Rocky/Alma 8, Debian 10, Ubuntu 20.04.
  GLIBC_FLOOR: '2.28'

jobs:
  # Linux and macOS are separate jobs, not one matrix: the verify jobs only need
  # the Linux artifacts, and a single `needs:` on a combined matrix would make
  # them wait for the macOS build too. needs: works per job, not per matrix entry.
  build-linux:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            pkgarch: amd64      # nfpm maps this to deb:amd64 / rpm:x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
            pkgarch: arm64      # nfpm maps this to deb:arm64 / rpm:aarch64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m unittest discover -s tests

      # THE BINARY IS BUILT INSIDE almalinux:8, NOT ON THE RUNNER.
      #
      # A PyInstaller binary is glibc-linked and only runs on glibc >= the one it
      # was built against. Building on the ubuntu-22.04 runner (glibc 2.35) looks
      # fine on Debian, but RHEL/Rocky/Alma 9 ship glibc *2.34* -- older than the
      # runner. That binary died on Rocky 9 with:
      #   Failed to load libpython3.12.so.1.0: version `GLIBC_2.35' not found
      # AlmaLinux 8 has glibc 2.28, so the binary runs on RHEL 8+, Debian 10+
      # and Ubuntu 20.04+.
      #
      # NOT manylinux_2_28 (same glibc, and the obvious choice): its CPythons in
      # /opt/python are built static, without --enable-shared, because they exist
      # to build wheels. PyInstaller needs a shared libpython and refuses:
      #   ERROR: Python was built without a shared library
      # The distro python from the AppStream is built shared, so we use that.
      #
      # Only the build runs in the container -- checkout/upload-artifact stay on
      # the host, because their Node runtime does not like a glibc that old.
      - name: Build binary in almalinux:8 (glibc 2.28)
        run: |
          set -eux
          docker run --rm -v "$PWD":/io -w /io almalinux:8 bash -euxc '
            dnf install -y --quiet python3.11 python3.11-pip python3.11-devel binutils
            PY=/usr/bin/python3.11
            "$PY" -m pip install --quiet --upgrade pip
            "$PY" -m pip install --quiet -r requirements.txt pyinstaller
            # --strip takes the binary from ~22 MB to ~8.6 MB (debug symbols).
            # No UPX: UPX-packed executables trip AV/EDR heuristics, which is the
            # wrong kind of attention for a security tool.
            "$PY" -m PyInstaller --onefile --clean --strip \
              --exclude-module tkinter \
              --name sshscan sshscan.py
          '
          sudo chown -R "$(id -u):$(id -g)" dist build

      # Cheap early guard: catches a build that drifted back onto the runner.
      # It only inspects the PyInstaller *bootloader* -- the embedded
      # libpython3.12.so (the library that actually blew up on Rocky 9) lives
      # inside the archive and is invisible to objdump. The real proof is the
      # verify-rpm job running the binary on Rocky 9. Do not delete that job and
      # rely on this check alone.
      - name: Assert glibc floor
        run: |
          set -eu
          need=$(objdump -T dist/sshscan \
                 | sed -n 's/.*GLIBC_\([0-9.]*\).*/\1/p' \
                 | sort -V | tail -1)
          echo "highest glibc symbol required: $need (floor: $GLIBC_FLOOR)"
          if [ "$(printf '%s\n%s\n' "$need" "$GLIBC_FLOOR" | sort -V | tail -1)" != "$GLIBC_FLOOR" ]; then
            echo "::error::binary requires glibc $need, above the $GLIBC_FLOOR floor -- it will not run on RHEL/Rocky/Alma"
            exit 1
          fi

      # Network-free code paths only -- these must work in a bundled binary.
      - name: Smoke-test the binary
        run: |
          ./dist/sshscan --version
          ./dist/sshscan --legend
          ./dist/sshscan --list-algorithms  > /dev/null
          ./dist/sshscan --list-frameworks  > /dev/null
          ./dist/sshscan --list-filter      > /dev/null

      # tar.gz only, no zip: measured on 3.7.2, gzip buys ~2% (PyInstaller already
      # compresses its archive internally). The archive is here for the executable
      # bit and the clean `sshscan` name, not for the bytes.
      - name: Package tarball
        run: |
          mkdir -p out
          cp dist/sshscan sshscan
          chmod +x sshscan
          tar -czf "out/sshscan-${{ matrix.target }}.tar.gz" sshscan

      # Two package flavours, user picks:
      #   sshscan      -- the .py script, uses the distro's python3 + PyYAML (~50 KB)
      #   sshscan-bin  -- the PyInstaller binary, no Python needed (~8.6 MB)
      # Both install /usr/bin/sshscan, so they declare Conflicts/Provides on
      # each other (see packaging/*.yaml).
      #
      # `go install` drops the binary in $HOME/go/bin, which is NOT on the
      # runner's PATH -- without the GITHUB_PATH line this step still succeeds
      # and the *next* one dies with "nfpm: command not found".
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          "$HOME/go/bin/nfpm" --version

      - name: Build deb + rpm
        env:
          PKG_ARCH: ${{ matrix.pkgarch }}
        run: |
          set -eux
          # Version comes from the single source of truth, so it is right for
          # both tag pushes and manual runs.
          PKG_VERSION=$(python3 -c "import re;print(re.search(r\"__version__\s*=\s*'([^']+)'\", open('sshscan.py').read()).group(1))")
          export PKG_VERSION
          echo "Packaging sshscan $PKG_VERSION ($PKG_ARCH)"

          # /usr/bin/sshscan for the script flavour -- sshscan.py already carries
          # the #!/usr/bin/env python3 shebang.
          cp sshscan.py dist/sshscan-script
          chmod +x dist/sshscan-script

          for cfg in packaging/nfpm-python.yaml packaging/nfpm-binary.yaml; do
            for fmt in deb rpm; do
              nfpm package -f "$cfg" -p "$fmt" -t out/
            done
          done
          ls -lh out/

      - name: Checksums
        run: |
          cd out
          shasum -a 256 * > "../SHA256SUMS-${{ matrix.target }}"
          mv "../SHA256SUMS-${{ matrix.target }}" .
          cat "SHA256SUMS-${{ matrix.target }}"

      - name: Sizes
        run: |
          echo "::notice title=Size ${{ matrix.target }}::$(du -h dist/sshscan | cut -f1) raw binary / $(du -h out/sshscan-${{ matrix.target }}.tar.gz | cut -f1) tar.gz"
          ls -lh out/

      - uses: actions/upload-artifact@v7
        with:
          name: sshscan-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  build-macos:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: macos-arm64
          # Intel (macos-13) dropped on purpose: the runner is scarce and sat in
          # the queue for an hour, blocking the whole run. Node 24 also drops
          # macOS <= 13.4. Intel users get the .py build via the Homebrew tap.
          # To bring it back: - {os: macos-13, target: macos-x86_64}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run test suite
        run: python -m unittest discover -s tests

      # No --strip here: it can break the code signature on macOS.
      - name: Build binary
        run: |
          pyinstaller --onefile --clean \
            --exclude-module tkinter \
            --name sshscan sshscan.py

      - name: Smoke-test the binary
        run: |
          ./dist/sshscan --version
          ./dist/sshscan --legend
          ./dist/sshscan --list-algorithms  > /dev/null
          ./dist/sshscan --list-frameworks  > /dev/null
          ./dist/sshscan --list-filter      > /dev/null

      - name: Package tarball
        run: |
          mkdir -p out
          cp dist/sshscan sshscan
          chmod +x sshscan
          tar -czf "out/sshscan-${{ matrix.target }}.tar.gz" sshscan
          cd out
          shasum -a 256 * > "SHA256SUMS-${{ matrix.target }}"

      - name: Sizes
        run: |
          echo "::notice title=Size ${{ matrix.target }}::$(du -h dist/sshscan | cut -f1) raw binary / $(du -h out/sshscan-${{ matrix.target }}.tar.gz | cut -f1) tar.gz"
          ls -lh out/

      - uses: actions/upload-artifact@v7
        with:
          name: sshscan-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  # "Should work on Debian" is not "does work on Debian". Installing via apt (not
  # dpkg -i) is the point: it proves the declared dependencies actually resolve.
  verify-deb:
    name: deb ${{ matrix.image }} / ${{ matrix.target }}
    needs: build-linux
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:12
            os: ubuntu-22.04
            target: linux-x86_64
          - image: debian:13
            os: ubuntu-22.04
            target: linux-x86_64
          - image: debian:12
            os: ubuntu-22.04-arm
            target: linux-arm64
          - image: debian:13
            os: ubuntu-22.04-arm
            target: linux-arm64

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sshscan-${{ matrix.target }}

      - name: Checksums and tarball
        run: |
          set -eux
          ldd --version | head -1
          sha256sum -c "SHA256SUMS-${{ matrix.target }}"
          tar -xzf "sshscan-${{ matrix.target }}.tar.gz"
          test -x sshscan                    # executable bit survived the archive
          ./sshscan --version

      - name: Install sshscan-bin (self-contained)
        run: |
          set -eux
          apt-get update
          apt-get install -y ./sshscan-bin_*.deb
          command -v sshscan
          sshscan --version
          sshscan --list-frameworks > /dev/null
          test -f /etc/sshscan/sshscan.conf
          apt-get remove -y sshscan-bin

      - name: Install sshscan (python script)
        run: |
          set -eux
          apt-get install -y ./sshscan_*.deb
          command -v sshscan
          sshscan --version
          sshscan --list-frameworks > /dev/null
          test -f /etc/sshscan/sshscan.conf
          apt-get remove -y sshscan

  # Same idea on the RPM side. Rocky 9 (glibc 2.34) is the important one here:
  # it is *older* than the Ubuntu runner and caught the binary that only ran on
  # glibc >= 2.35. dnf install (not rpm -i) so dependency resolution is exercised
  # -- the ssh client package is spelled openssh-clients here, not openssh-client.
  verify-rpm:
    name: rpm ${{ matrix.image }} / ${{ matrix.target }}
    needs: build-linux
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: rockylinux:9
            os: ubuntu-22.04
            target: linux-x86_64
          - image: fedora:latest
            os: ubuntu-22.04
            target: linux-x86_64
          - image: rockylinux:9
            os: ubuntu-22.04-arm
            target: linux-arm64

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sshscan-${{ matrix.target }}

      - name: Install sshscan-bin (self-contained)
        run: |
          set -eux
          ldd --version | head -1
          dnf install -y ./sshscan-bin-*.rpm
          command -v sshscan
          sshscan --version
          sshscan --list-frameworks > /dev/null
          test -f /etc/sshscan/sshscan.conf
          dnf remove -y sshscan-bin

      - name: Install sshscan (python script)
        run: |
          set -eux
          dnf install -y ./sshscan-[0-9]*.rpm
          command -v sshscan
          sshscan --version
          sshscan --list-frameworks > /dev/null
          dnf remove -y sshscan

  release:
    name: Attach binaries to release
    needs: [build-linux, build-macos, verify-deb, verify-rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
             --repo  "$GITHUB_REPOSITORY" \
             --title "$GITHUB_REF_NAME" \
             --notes "Verify downloads against SHA256SUMS-<platform>.

          **Packages** (Linux): \`sshscan\` needs the distro's python3 + PyYAML (~50 KB); \`sshscan-bin\` bundles its own Python (~8.6 MB). They conflict -- install one.
          **Tarball**: unpack and run, no install needed.

          Linux binaries are built against glibc 2.28 (RHEL/Rocky/Alma 8+, Debian 10+, Ubuntu 20.04+). All variants shell out to the system \`ssh\` client." \
             artifacts/* \
          || gh release upload "$GITHUB_REF_NAME" artifacts/* \
             --repo "$GITHUB_REPOSITORY" --clobber
