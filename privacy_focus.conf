# Privacy-Focused SSH Scanner Configuration
# Designed to detect and avoid NSA-suspicious algorithms
# Uses the PRIVACY_FOCUSED compliance framework
#
# Location: the scanner auto-discovers a config in this order --
#   1. ./sshscan.conf              (current directory)
#   2. ~/.conf/sshscan.conf        (user config)
#   3. /etc/sshscan/sshscan.conf   (system-wide)
# So either copy this file to one of those paths, or pass it explicitly:
#   sshscan --config privacy_focus.conf --host example.com

[scanner]
# Moderate threading for thorough analysis
threads = 30

# Slightly longer timeout for comprehensive checks
timeout = 12

# More retry attempts for better accuracy
retry_attempts = 3

# Standard DNS cache TTL
dns_cache_ttl = 600

# Scan mode. yes (default) = read the server's KEXINIT in a single connection;
# client-independent and one connection per host instead of ~50.
# no = per-algorithm probing via the local ssh client (same as --probe).
# fast = yes

# Banner grab timeout (3s is sufficient for most hosts)
# banner_timeout = 3

# Rate limiting — uncomment to throttle (connections per second)
# rate_limit = 10.0

# Host key checking — accept-new is safe with UserKnownHostsFile=/dev/null
# strict_host_key_checking = accept-new

[compliance]
framework = PRIVACY_FOCUSED

# ====================================================================
# WHAT THIS CONFIGURATION DOES
# ====================================================================
#
# The PRIVACY_FOCUSED framework is the strictest one shipped. It automatically:
#
# 1. REQUIRES these algorithms (all of them — a missing one fails the check):
#    - chacha20-poly1305@openssh.com, aes256-gcm@openssh.com   (ciphers)
#    - hmac-sha2-256-etm@openssh.com, hmac-sha2-512-etm@openssh.com   (MACs)
#    - curve25519-sha256                                       (key exchange)
#    - ssh-ed25519                                             (host keys)
#
# 2. FORBIDS the NSA-suspicious NIST curves:
#    - ecdh-sha2-nistp256, ecdh-sha2-nistp384, ecdh-sha2-nistp521
#    - ecdsa-sha2-nistp256, ecdsa-sha2-nistp384, ecdsa-sha2-nistp521
#      (including their -cert- and sk- FIDO variants)
#
# 3. FORBIDS the non-ETM MACs — note this, it trips up otherwise sane servers:
#    - hmac-sha2-256, hmac-sha2-512  (Encrypt-and-MAC, padding-oracle exposure)
#      Only the -etm@openssh.com (Encrypt-then-MAC) variants are accepted.
#    - plus everything SHA-1 / MD5 based, and umac-64 / umac-128
#
# 4. FORBIDS the CBC ciphers and the usual legacy set (3DES, arcfour, blowfish, ...)
#
# 5. ENFORCES a minimum security score of 95/100
#
# A server that satisfies all of this is, in practice, a modern OpenSSH with an
# explicitly narrowed algorithm list. See hardening-examples/sshd_config.strict.
#
# ====================================================================
