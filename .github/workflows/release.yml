name: Release binaries

# Tag push -> build + attach to the GitHub release.
# Manual run  -> build only (artifacts land under the workflow run, no release touched).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Linux and macOS are separate jobs, not one matrix: verify-debian only needs
  # the Linux binary, and a single `needs:` on a combined matrix would make it
  # wait for the macOS build too. needs: works per job, not per matrix entry.
  build-linux:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported glibc wins: a binary built on 22.04 (glibc 2.35)
          # also runs on Debian 12 (2.36) and 13 (2.41). The reverse is not true.
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run test suite
        run: python -m unittest discover -s tests

      # Do not drop --strip: it is what takes the Linux binary from 21.9 MB to
      # 8.6 MB (debug symbols). Linux-only -- on macOS it can break the signature.
      # No UPX on purpose: UPX-packed executables trip AV/EDR heuristics, which
      # is the wrong kind of attention for a security tool.
      - name: Build binary
        run: |
          pyinstaller --onefile --clean --strip \
            --exclude-module tkinter \
            --name sshscan sshscan.py

      # Network-free code paths only -- these must work in a bundled binary.
      - name: Smoke-test the binary
        run: |
          ./dist/sshscan --version
          ./dist/sshscan --legend
          ./dist/sshscan --list-algorithms  > /dev/null
          ./dist/sshscan --list-frameworks  > /dev/null
          ./dist/sshscan --list-filter      > /dev/null

      # Ship archives, not bare binaries: tar/zip carry the executable bit, a
      # browser download of a raw binary does not. Checksums cover the archives,
      # i.e. what people actually download.
      # tar.gz only, no zip: measured on 3.7.2, gzip buys ~2% (PyInstaller already
      # compresses its archive internally). The archive is here for the executable
      # bit and the clean `sshscan` name, not for the bytes -- a zip would add a
      # third identical-sized asset per platform for nothing.
      - name: Package
        run: |
          mkdir -p out
          cp dist/sshscan sshscan
          chmod +x sshscan
          tar -czf "out/sshscan-${{ matrix.target }}.tar.gz" sshscan
          cd out
          shasum -a 256 "sshscan-${{ matrix.target }}.tar.gz" \
                        > "SHA256SUMS-${{ matrix.target }}"

      - name: Sizes
        run: |
          echo "::notice title=Size ${{ matrix.target }}::$(du -h dist/sshscan | cut -f1) raw / $(du -h out/sshscan-${{ matrix.target }}.tar.gz | cut -f1) tar.gz"
          echo "--- raw binary ---"; ls -lh dist/sshscan
          echo "--- archive ---";    ls -lh out/

      - uses: actions/upload-artifact@v7
        with:
          name: sshscan-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  build-macos:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: macos-arm64
          # Intel (macos-13) dropped on purpose: the runner is scarce and sat in
          # the queue for an hour, blocking the whole run. Node 24 also drops
          # macOS <= 13.4. Intel users get the .py build via the Homebrew tap.
          # To bring it back: - {os: macos-13, target: macos-x86_64}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run test suite
        run: python -m unittest discover -s tests

      # No --strip here: it can break the code signature on macOS.
      - name: Build binary
        run: |
          pyinstaller --onefile --clean \
            --exclude-module tkinter \
            --name sshscan sshscan.py

      - name: Smoke-test the binary
        run: |
          ./dist/sshscan --version
          ./dist/sshscan --legend
          ./dist/sshscan --list-algorithms  > /dev/null
          ./dist/sshscan --list-frameworks  > /dev/null
          ./dist/sshscan --list-filter      > /dev/null

      # tar.gz only, no zip: measured on 3.7.2, gzip buys ~2% (PyInstaller already
      # compresses its archive internally). The archive is here for the executable
      # bit and the clean `sshscan` name, not for the bytes -- a zip would add a
      # third identical-sized asset per platform for nothing.
      - name: Package
        run: |
          mkdir -p out
          cp dist/sshscan sshscan
          chmod +x sshscan
          tar -czf "out/sshscan-${{ matrix.target }}.tar.gz" sshscan
          cd out
          shasum -a 256 "sshscan-${{ matrix.target }}.tar.gz" \
                        > "SHA256SUMS-${{ matrix.target }}"

      - name: Sizes
        run: |
          echo "::notice title=Size ${{ matrix.target }}::$(du -h dist/sshscan | cut -f1) raw / $(du -h out/sshscan-${{ matrix.target }}.tar.gz | cut -f1) tar.gz"
          echo "--- raw binary ---"; ls -lh dist/sshscan
          echo "--- archive ---";    ls -lh out/

      - uses: actions/upload-artifact@v7
        with:
          name: sshscan-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  # "Should run on Debian" is not "does run on Debian" -- so run it there.
  # Unpacking the shipped archive here also proves the archive is intact and
  # that the executable bit survives the round trip.
  verify-debian:
    name: verify ${{ matrix.debian }} / ${{ matrix.target }}
    needs: build-linux
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.debian }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - debian: debian:12
            os: ubuntu-22.04
            target: linux-x86_64
          - debian: debian:13
            os: ubuntu-22.04
            target: linux-x86_64
          - debian: debian:12
            os: ubuntu-22.04-arm
            target: linux-arm64
          - debian: debian:13
            os: ubuntu-22.04-arm
            target: linux-arm64

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sshscan-${{ matrix.target }}

      - name: Verify checksum, unpack, run on a bare Debian
        run: |
          set -eux
          ldd --version | head -1
          sha256sum -c "SHA256SUMS-${{ matrix.target }}"
          tar -xzf "sshscan-${{ matrix.target }}.tar.gz"
          test -x sshscan                      # executable bit survived the archive
          ./sshscan --version
          ./sshscan --legend
          ./sshscan --list-algorithms > /dev/null
          ./sshscan --list-frameworks > /dev/null

  release:
    name: Attach binaries to release
    needs: [build-linux, build-macos, verify-debian]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
             --repo  "$GITHUB_REPOSITORY" \
             --title "$GITHUB_REF_NAME" \
             --notes "Prebuilt binaries. Unpack the archive for your platform and verify it against SHA256SUMS-<platform> first. The binary needs the system \`ssh\` client." \
             artifacts/* \
          || gh release upload "$GITHUB_REF_NAME" artifacts/* \
             --repo "$GITHUB_REPOSITORY" --clobber
